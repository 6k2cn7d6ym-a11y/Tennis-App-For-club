<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClubMatchOn · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e0d;--surface:#1a1916;--card:#1e1c19;
  --border:rgba(255,255,255,0.07);--text:#f5f0ea;--muted:#6a6158;
  --accent:#d4622a;--green:#4caf7d;--blue:#5b9bd5;--yellow:#e8b84d;--red:#e05252;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.login-logo{font-size:0.68rem;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.login-title{font-size:1.5rem;font-weight:900;letter-spacing:-1px;color:var(--text);margin-bottom:4px;}
.login-title span{color:var(--accent);}
.login-sub{font-size:0.75rem;color:var(--muted);margin-bottom:24px;}
.field{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:0.88rem;color:var(--text);outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.field:focus{border-color:var(--accent);}
.field::placeholder{color:var(--muted);}
.btn-login{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:4px;}
.login-err{font-size:0.73rem;color:var(--red);margin-top:8px;text-align:center;min-height:16px;}
#mainScreen{display:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.topbar-logo{font-size:0.88rem;font-weight:900;letter-spacing:-0.5px;}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.last-refresh{font-size:0.62rem;color:var(--muted);font-family:var(--mono);}
.btn-refresh{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:0.72rem;font-weight:600;color:var(--text);cursor:pointer;}
.btn-logout{background:transparent;border:none;font-family:inherit;font-size:0.72rem;color:var(--muted);cursor:pointer;padding:4px 6px;}
.content{padding:16px;max-width:600px;margin:0 auto;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--accent));}
.sum-label{font-size:0.6rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.sum-value{font-size:1.6rem;font-weight:900;font-family:var(--mono);line-height:1;color:var(--c,var(--text));}
.sum-unit{font-size:0.8rem;font-weight:600;margin-left:2px;}
.sec-title{font-size:0.6rem;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:0.7rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;}
.filter-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.search-inp{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:0.75rem;color:var(--text);outline:none;}
.search-inp:focus{border-color:var(--accent);}
.search-inp::placeholder{color:var(--muted);}
.club-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;border-left:3px solid var(--lc,var(--border));}
.club-name{font-size:0.95rem;font-weight:800;color:var(--text);margin-bottom:2px;}
.club-email{font-size:0.68rem;color:var(--muted);margin-bottom:10px;}
.club-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.stat-box{background:var(--surface);border-radius:8px;padding:8px 4px;text-align:center;}
.stat-val{font-size:1rem;font-weight:800;font-family:var(--mono);}
.stat-lbl{font-size:0.58rem;color:var(--muted);margin-top:2px;}
.club-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:0.62rem;font-weight:700;}
.badge-green{background:rgba(76,175,125,0.12);color:var(--green);}
.badge-yellow{background:rgba(232,184,77,0.12);color:var(--yellow);}
.badge-muted{background:rgba(255,255,255,0.05);color:var(--muted);}
.meta-txt{font-size:0.62rem;color:var(--muted);font-family:var(--mono);}
.loading{text-align:center;padding:40px 16px;color:var(--muted);font-size:0.82rem;}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ClubMatchOn</div>
    <div class="login-title">어드민<span> 대시보드</span></div>
    <div class="login-sub">관리자 계정으로 로그인하세요</div>
    <input class="field" type="email" id="emailInp" placeholder="이메일" autocomplete="email">
    <input class="field" type="password" id="pwInp" placeholder="비밀번호" onkeyup="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="mainScreen">
  <div class="topbar">
    <div class="topbar-logo">클럽<span>매치온</span> · Admin</div>
    <div class="topbar-right">
      <span class="last-refresh" id="lastRefresh"></span>
      <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="content">
    <div id="dashContent">
      <div class="loading"><div class="spinner"></div><br>불러오는 중...</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
var ADMIN_UIDS=['bf3HrPWnkLOAr8hK0EMIA0FXHul2'];
var firebaseConfig={apiKey:"AIzaSyDNvs8yTDxN_IfxiIrry0YQCF7YyUgMXCg",authDomain:"tennisclubmatchingapp.firebaseapp.com",projectId:"tennisclubmatchingapp",storageBucket:"tennisclubmatchingapp.firebasestorage.app",messagingSenderId:"139772384541",appId:"1:139772384541:web:239c297df12dcd22d53df4"};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth(),db=firebase.firestore();
var allClubs=[],curFilter='all',curSearch='';

auth.onAuthStateChanged(function(user){
  if(user&&ADMIN_UIDS.includes(user.uid)){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainScreen').style.display='block';
    loadData();
  }else if(user){auth.signOut();showErr('접근 권한이 없는 계정이에요 (UID: '+user.uid+')');}
});
function doLogin(){
  var e=document.getElementById('emailInp').value.trim(),p=document.getElementById('pwInp').value;
  showErr('');
  if(!e||!p){showErr('이메일과 비밀번호를 입력하세요');return;}
  auth.signInWithEmailAndPassword(e,p).catch(function(){showErr('로그인 실패: 이메일 또는 비밀번호 확인하세요');});
}
function doLogout(){auth.signOut().then(function(){document.getElementById('loginScreen').style.display='flex';document.getElementById('mainScreen').style.display='none';});}
function showErr(m){document.getElementById('loginErr').textContent=m;}

function loadData(){
  document.getElementById('dashContent').innerHTML='<div class="loading"><div class="spinner"></div><br>불러오는 중...</div>';
  db.collection('clubs').get().then(function(snap){
    allClubs=[];
    snap.forEach(function(doc){
      var d=doc.data(),parsed={members:[]};
      try{if(d.json)parsed=JSON.parse(d.json);}catch(e){}
      var members=parsed.members||[];
      var linked=members.filter(function(m){return m.uid;}).length;
      var lastActive=d.updatedAt||d.createdAt||null;
      var daysSince=lastActive?Math.floor((Date.now()-lastActive)/86400000):999;
      var status=daysSince<=7?'active':daysSince<=30?'recent':'inactive';
      var history=parsed.history||[];
      allClubs.push({
        id:doc.id,name:d.name||'(이름없음)',ownerEmail:d.ownerEmail||'',plan:d.plan||'free',
        createdAt:d.createdAt||null,updatedAt:lastActive,daysSince:daysSince,status:status,
        totalMembers:members.length,linked:linked,unlinked:members.length-linked,
        appCount:(d.memberUids||[]).length,
        dayCount:history.length,
        gameCount:history.reduce(function(a,h){return a+(h.courts?h.courts.length:0);},0)
      });
    });
    allClubs.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});
    var now=new Date();
    document.getElementById('lastRefresh').textContent=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    render();
  }).catch(function(e){document.getElementById('dashContent').innerHTML='<div class="loading" style="color:var(--red)">❌ 로드 실패: '+e.message+'</div>';});
}

function render(){
  var active=allClubs.filter(function(c){return c.status==='active';}).length;
  var recent=allClubs.filter(function(c){return c.status==='recent';}).length;
  var inactive=allClubs.filter(function(c){return c.status==='inactive';}).length;
  var totalM=allClubs.reduce(function(a,c){return a+c.totalMembers;},0);
  var totalL=allClubs.reduce(function(a,c){return a+c.linked;},0);
  var totalA=allClubs.reduce(function(a,c){return a+c.appCount;},0);
  var html='<div class="sum-grid">';
  html+=sc('전체 클럽','var(--accent)',allClubs.length,'개');
  html+=sc('활성 (7일)','var(--green)',active,'개');
  html+=sc('준활성 (30일)','var(--yellow)',recent,'개');
  html+=sc('비활성','var(--muted)',inactive,'개');
  html+=sc('등록 회원','var(--blue)',totalM,'명');
  html+=sc('앱 연결','var(--green)',totalL,'명');
  html+=sc('미연결','var(--muted)',totalM-totalL,'명');
  html+=sc('앱 가입자','var(--accent)',totalA,'명');
  html+='</div>';
  html+='<div class="sec-title">클럽 목록</div>';
  html+='<div class="filter-row">';
  html+='<input class="search-inp" type="text" placeholder="🔍 클럽 검색" oninput="curSearch=this.value;renderCards()" id="srch" value="'+esc(curSearch)+'">';
  html+=fb('all','전체 ('+allClubs.length+')');
  html+=fb('active','활성 ('+active+')');
  html+=fb('recent','준활성 ('+recent+')');
  html+=fb('inactive','비활성 ('+inactive+')');
  html+='</div>';
  html+='<div id="cardArea">'+cardsHTML()+'</div>';
  document.getElementById('dashContent').innerHTML=html;
}

function renderCards(){var el=document.getElementById('cardArea');if(el)el.innerHTML=cardsHTML();}

function cardsHTML(){
  var filtered=allClubs.filter(function(c){
    return (curFilter==='all'||c.status===curFilter)&&(!curSearch||c.name.includes(curSearch)||c.ownerEmail.includes(curSearch));
  });
  if(!filtered.length) return '<div style="text-align:center;padding:32px;color:var(--muted);font-size:0.82rem">해당하는 클럽이 없어요</div>';
  return filtered.map(function(c){
    var lc=c.status==='active'?'var(--green)':c.status==='recent'?'var(--yellow)':'var(--border)';
    var sb=c.status==='active'?'<span class="badge badge-green">● 활성</span>':c.status==='recent'?'<span class="badge badge-yellow">● 준활성</span>':'<span class="badge badge-muted">● 비활성</span>';
    var pb=c.plan==='premium'?'<span class="badge badge-yellow">💎 프리미엄</span>':'<span class="badge badge-muted">Free</span>';
    var dl=c.daysSince<999?(c.daysSince===0?'오늘':c.daysSince+'일 전'):'오래됨';
    return '<div class="club-card" style="--lc:'+lc+'">'+
      '<div class="club-name">'+esc(c.name)+'</div>'+
      '<div class="club-email">'+esc(c.ownerEmail)+'</div>'+
      '<div class="club-stats">'+
        sb2(c.totalMembers,'등록회원','var(--text)')+
        sb2(c.linked,'앱연결','var(--green)')+
        sb2(c.unlinked,'미연결','var(--muted)')+
        sb2(c.appCount,'가입자','var(--blue)')+
      '</div>'+
      '<div class="club-meta">'+sb+pb+
        '<span class="meta-txt">'+dl+'</span>'+
        '<span class="meta-txt">·</span>'+
        '<span class="meta-txt">'+(c.createdAt?fmtDate(c.createdAt):'—')+'생성</span>'+
        '<span class="meta-txt">·</span>'+
        '<span class="meta-txt">'+c.dayCount+'일 '+c.gameCount+'게임</span>'+
      '</div></div>';
  }).join('');
}

function sc(label,color,val,unit){return '<div class="sum-card" style="--c:'+color+'"><div class="sum-label">'+label+'</div><div class="sum-value">'+val+'<span class="sum-unit">'+unit+'</span></div></div>';}
function fb(key,label){return '<button class="filter-btn'+(curFilter===key?' on':'')+'" onclick="curFilter=\''+key+'\';render()">'+label+'</button>';}
function sb2(val,lbl,color){return '<div class="stat-box"><div class="stat-val" style="color:'+color+'">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>';}
function fmtDate(ts){var d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' ';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
