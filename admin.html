<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClubMatchOn · 어드민</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e0d;
  --surface:#1a1916;
  --card:#211f1c;
  --border:rgba(255,255,255,0.07);
  --text:#f5f0ea;
  --muted:#7a7269;
  --accent:#d4622a;
  --accent2:#e8854d;
  --green:#4caf7d;
  --blue:#5b9bd5;
  --yellow:#e8b84d;
  --red:#e05252;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── 로그인 ── */
#loginScreen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
}
.login-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:40px 36px;width:100%;max-width:380px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
.login-logo{font-size:0.72rem;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.login-title{font-size:1.6rem;font-weight:900;letter-spacing:-1px;color:var(--text);margin-bottom:4px;}
.login-title span{color:var(--accent);}
.login-sub{font-size:0.78rem;color:var(--muted);margin-bottom:28px;}
.field{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:0.88rem;color:var(--text);outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.field:focus{border-color:var(--accent);}
.field::placeholder{color:var(--muted);}
.btn-login{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:0.92rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:4px;}
.btn-login:hover{opacity:0.88;}
.login-err{font-size:0.75rem;color:var(--red);margin-top:8px;text-align:center;min-height:18px;}

/* ── 메인 ── */
#mainScreen{display:none;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:100;
}
.topbar-logo{font-size:0.9rem;font-weight:900;letter-spacing:-0.5px;}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.last-refresh{font-size:0.68rem;color:var(--muted);font-family:var(--mono);}
.btn-refresh{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:inherit;font-size:0.75rem;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.2s;}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent);}
.btn-logout{background:transparent;border:none;font-family:inherit;font-size:0.75rem;color:var(--muted);cursor:pointer;padding:4px 8px;}
.btn-logout:hover{color:var(--red);}

.content{padding:24px;max-width:1100px;margin:0 auto;}

/* ── 요약 카드 ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.sum-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;
}
.sum-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent-c,var(--accent));
}
.sum-label{font-size:0.65rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.sum-value{font-size:2rem;font-weight:900;font-family:var(--mono);color:var(--text);line-height:1;}
.sum-sub{font-size:0.68rem;color:var(--muted);margin-top:5px;}

/* ── 섹션 타이틀 ── */
.sec-title{
  font-size:0.65rem;font-weight:800;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── 테이블 ── */
.table-wrap{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;margin-bottom:24px;
}
.table-header{
  display:grid;padding:10px 16px;
  font-size:0.62rem;font-weight:700;letter-spacing:1px;color:var(--muted);
  text-transform:uppercase;border-bottom:1px solid var(--border);
  background:var(--surface);
}
.table-row{
  display:grid;padding:13px 16px;
  border-bottom:1px solid var(--border);
  transition:background 0.15s;align-items:center;
}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:rgba(255,255,255,0.02);}

/* 클럽 테이블 컬럼 */
.club-grid{grid-template-columns:2fr 80px 80px 80px 90px 90px 80px;}

/* ── 배지 ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:0.65rem;font-weight:700;}
.badge-green{background:rgba(76,175,125,0.12);color:var(--green);}
.badge-yellow{background:rgba(232,184,77,0.12);color:var(--yellow);}
.badge-red{background:rgba(224,82,82,0.12);color:var(--red);}
.badge-muted{background:rgba(255,255,255,0.05);color:var(--muted);}

/* ── 차트 바 ── */
.bar-wrap{display:flex;align-items:center;gap:8px;}
.bar-track{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}

/* ── 로딩 ── */
.loading-msg{text-align:center;padding:48px;color:var(--muted);font-size:0.85rem;}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 기타 ── */
.cell-name{font-size:0.82rem;font-weight:700;color:var(--text);}
.cell-sub{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.cell-num{font-size:0.85rem;font-weight:700;font-family:var(--mono);text-align:center;}
.cell-date{font-size:0.68rem;font-family:var(--mono);color:var(--muted);}

.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:0.72rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.search-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:0.78rem;color:var(--text);outline:none;width:200px;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ClubMatchOn</div>
    <div class="login-title">어드민<span> 대시보드</span></div>
    <div class="login-sub">관리자 계정으로 로그인하세요</div>
    <input class="field" type="email" id="emailInp" placeholder="이메일" autocomplete="email">
    <input class="field" type="password" id="pwInp" placeholder="비밀번호" onkeyup="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 메인 -->
<div id="mainScreen">
  <div class="topbar">
    <div class="topbar-logo">클럽<span>매치온</span> · Admin</div>
    <div class="topbar-right">
      <span class="last-refresh" id="lastRefresh"></span>
      <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="content">
    <div id="dashContent">
      <div class="loading-msg">
        <div class="spinner"></div><br>데이터 불러오는 중...
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ── 설정 ──────────────────────────────
// Firebase 콘솔 → Authentication → Users 탭에서 본인 UID 확인 후 입력
var ADMIN_UIDS = [
  'YOUR_FIREBASE_UID_HERE'  // ← Firebase UID 입력 (이메일 아님)
];

var firebaseConfig = {
  apiKey:"AIzaSyDNvs8yTDxN_IfxiIrry0YQCF7YyUgMXCg",
  authDomain:"tennisclubmatchingapp.firebaseapp.com",
  projectId:"tennisclubmatchingapp",
  storageBucket:"tennisclubmatchingapp.firebasestorage.app",
  messagingSenderId:"139772384541",
  appId:"1:139772384541:web:239c297df12dcd22d53df4"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

// ── 상태 ──────────────────────────────
var allClubs = [];
var currentFilter = 'all';
var searchQuery = '';

// ── 인증 ──────────────────────────────
auth.onAuthStateChanged(function(user){
  if(user && ADMIN_UIDS.includes(user.uid)){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainScreen').style.display='block';
    loadData();
  } else if(user){
    auth.signOut();
    showErr('접근 권한이 없는 계정이에요');
  }
});

function doLogin(){
  var email=document.getElementById('emailInp').value.trim();
  var pw=document.getElementById('pwInp').value;
  showErr('');
  if(!email||!pw){showErr('이메일과 비밀번호를 입력하세요');return;}
  auth.signInWithEmailAndPassword(email,pw)
    .catch(function(e){
      showErr('로그인 실패: 이메일 또는 비밀번호를 확인하세요');
    });
}
function doLogout(){
  auth.signOut().then(function(){
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('mainScreen').style.display='none';
  });
}
function showErr(msg){document.getElementById('loginErr').textContent=msg;}

// ── 데이터 로드 ──────────────────────────────
function loadData(){
  document.getElementById('dashContent').innerHTML=
    '<div class="loading-msg"><div class="spinner"></div><br>데이터 불러오는 중...</div>';

  db.collection('clubs').get().then(function(snap){
    allClubs=[];
    snap.forEach(function(doc){
      var d=doc.data();
      var parsed={members:[]};
      try{ if(d.json) parsed=JSON.parse(d.json); }catch(e){}

      var members=parsed.members||[];
      var linkedMembers=members.filter(function(m){return m.uid;}).length;
      var unlinkedMembers=members.length-linkedMembers;
      var lastActive=d.updatedAt||d.createdAt||null;
      var daysSince=lastActive?Math.floor((Date.now()-lastActive)/(1000*60*60*24)):999;
      var activeStatus=daysSince<=7?'active':daysSince<=30?'recent':'inactive';

      // history 기반 최근 경기일
      var history=parsed.history||[];
      var lastGameDate=history.length?history[history.length-1].date||history[history.length-1].dateKey||'':null;

      allClubs.push({
        id:doc.id,
        name:d.name||'(이름없음)',
        ownerId:d.ownerId||'',
        ownerEmail:d.ownerEmail||'',
        plan:d.plan||'free',
        createdAt:d.createdAt||null,
        updatedAt:lastActive,
        daysSince:daysSince,
        activeStatus:activeStatus,
        totalMembers:members.length,
        linkedMembers:linkedMembers,
        unlinkedMembers:unlinkedMembers,
        appMemberCount:(d.memberUids||[]).length,
        lastGameDate:lastGameDate,
        gameCount:history.reduce(function(acc,h){return acc+(h.courts?h.courts.length:0);},0),
        dayCount:history.length,
      });
    });

    // 최신 생성 순 정렬
    allClubs.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});

    var now=new Date();
    document.getElementById('lastRefresh').textContent=
      '마지막 갱신: '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

    render();
  }).catch(function(e){
    document.getElementById('dashContent').innerHTML=
      '<div class="loading-msg" style="color:var(--red)">❌ 데이터 로드 실패: '+e.message+'</div>';
  });
}

// ── 렌더 ──────────────────────────────
function render(){
  var activeClubs=allClubs.filter(function(c){return c.activeStatus==='active';}).length;
  var recentClubs=allClubs.filter(function(c){return c.activeStatus==='recent';}).length;
  var inactiveClubs=allClubs.filter(function(c){return c.activeStatus==='inactive';}).length;
  var totalMembers=allClubs.reduce(function(a,c){return a+c.totalMembers;},0);
  var totalLinked=allClubs.reduce(function(a,c){return a+c.linkedMembers;},0);
  var totalApp=allClubs.reduce(function(a,c){return a+c.appMemberCount;},0);

  var html='';

  // ── 요약 카드
  html+='<div class="summary-grid">';
  html+=sumCard('전체 클럽','--accent',allClubs.length+'개','생성된 클럽 총합');
  html+=sumCard('활성 클럽 (7일)','--green',activeClubs+'개','최근 7일 내 활동');
  html+=sumCard('준활성 (30일)','--yellow',recentClubs+'개','7~30일 사이 활동');
  html+=sumCard('비활성','--muted',inactiveClubs+'개','30일 이상 미활동');
  html+=sumCard('전체 등록 회원','--blue',totalMembers+'명','이름 등록 기준');
  html+=sumCard('앱 연결 회원','--green',totalLinked+'명','uid 연결된 회원');
  html+=sumCard('앱 계정 (가입자)','--accent2',totalApp+'명','Firebase Auth 가입자');
  html+='</div>';

  // ── 클럽 목록
  html+='<div class="sec-title">클럽 목록</div>';

  // 필터/검색 바
  html+='<div class="filter-row">';
  html+='<input class="search-input" type="text" placeholder="🔍 클럽 이름 검색" oninput="searchQuery=this.value;renderTable()" id="searchInp" value="'+escHtml(searchQuery)+'">';
  html+='<button class="filter-btn'+(currentFilter==='all'?' active':'')+'" onclick="setFilter(\'all\')">전체 ('+allClubs.length+')</button>';
  html+='<button class="filter-btn'+(currentFilter==='active'?' active':'')+'" onclick="setFilter(\'active\')">활성 ('+activeClubs+')</button>';
  html+='<button class="filter-btn'+(currentFilter==='recent'?' active':'')+'" onclick="setFilter(\'recent\')">준활성 ('+recentClubs+')</button>';
  html+='<button class="filter-btn'+(currentFilter==='inactive'?' active':'')+'" onclick="setFilter(\'inactive\')">비활성 ('+inactiveClubs+')</button>';
  html+='</div>';

  html+='<div class="table-wrap" id="clubTable">';
  html+=renderTableHTML();
  html+='</div>';

  document.getElementById('dashContent').innerHTML=html;
}

function renderTable(){
  var el=document.getElementById('clubTable');
  if(el) el.innerHTML=renderTableHTML();
}

function renderTableHTML(){
  var filtered=allClubs.filter(function(c){
    var matchFilter=currentFilter==='all'||c.activeStatus===currentFilter;
    var matchSearch=!searchQuery||c.name.includes(searchQuery)||c.ownerEmail.includes(searchQuery);
    return matchFilter&&matchSearch;
  });

  var html='';
  html+='<div class="table-header club-grid">';
  html+='<span>클럽</span><span style="text-align:center">등록회원</span><span style="text-align:center">앱연결</span><span style="text-align:center">미연결</span><span style="text-align:center">상태</span><span style="text-align:center">마지막활동</span><span style="text-align:center">플랜</span>';
  html+='</div>';

  if(!filtered.length){
    html+='<div style="text-align:center;padding:32px;color:var(--muted);font-size:0.82rem">해당하는 클럽이 없어요</div>';
    return html;
  }

  var maxMembers=Math.max.apply(null,filtered.map(function(c){return c.totalMembers;})||[1]);

  filtered.forEach(function(c){
    var statusBadge=
      c.activeStatus==='active'?'<span class="badge badge-green">● 활성</span>':
      c.activeStatus==='recent'?'<span class="badge badge-yellow">● 준활성</span>':
      '<span class="badge badge-muted">● 비활성</span>';

    var planBadge=c.plan==='premium'?
      '<span class="badge badge-yellow">💎 프리미엄</span>':
      '<span class="badge badge-muted">Free</span>';

    var lastDate=c.updatedAt?fmtDate(c.updatedAt):'—';
    var daysLabel=c.daysSince<999?(c.daysSince===0?'오늘':c.daysSince+'일 전'):'오래됨';

    var barPct=maxMembers>0?Math.round((c.totalMembers/maxMembers)*100):0;
    var barColor=c.activeStatus==='active'?'var(--green)':c.activeStatus==='recent'?'var(--yellow)':'var(--muted)';

    html+='<div class="table-row club-grid">';
    html+='<div><div class="cell-name">'+escHtml(c.name)+'</div>'+
      '<div class="cell-sub">'+escHtml(c.ownerEmail||c.ownerId.slice(0,8))+'</div>'+
      '<div class="cell-sub" style="margin-top:2px">생성: '+(c.createdAt?fmtDate(c.createdAt):'—')+'</div></div>';
    html+='<div><div class="bar-wrap">'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+barPct+'%;background:'+barColor+'"></div></div>'+
      '<span class="cell-num" style="min-width:28px">'+c.totalMembers+'</span></div></div>';
    html+='<div class="cell-num" style="color:var(--green)">'+c.linkedMembers+'</div>';
    html+='<div class="cell-num" style="color:var(--muted)">'+c.unlinkedMembers+'</div>';
    html+=statusBadge+'</div>'; // statusBadge already in a div? No...
    html='';// restart — structure issue, let me redo
  });
  // redo properly
  html='';
  html+='<div class="table-header club-grid">';
  html+='<span>클럽</span><span style="text-align:center">등록회원</span><span style="text-align:center">앱연결</span><span style="text-align:center">미연결</span><span style="text-align:center">상태</span><span style="text-align:center">마지막활동</span><span style="text-align:center">플랜</span>';
  html+='</div>';

  filtered.forEach(function(c){
    var statusBadge=
      c.activeStatus==='active'?'<span class="badge badge-green">● 활성</span>':
      c.activeStatus==='recent'?'<span class="badge badge-yellow">● 준활성</span>':
      '<span class="badge badge-muted">● 비활성</span>';
    var planBadge=c.plan==='premium'?
      '<span class="badge badge-yellow">💎 프리미엄</span>':
      '<span class="badge badge-muted">Free</span>';
    var daysLabel=c.daysSince<999?(c.daysSince===0?'오늘':c.daysSince+'일 전'):'오래됨';
    var barPct=maxMembers>0?Math.round((c.totalMembers/maxMembers)*100):0;
    var barColor=c.activeStatus==='active'?'var(--green)':c.activeStatus==='recent'?'var(--yellow)':'var(--muted)';

    html+='<div class="table-row club-grid">';
    // 클럽명
    html+='<div><div class="cell-name">'+escHtml(c.name)+'</div>'+
      '<div class="cell-sub">'+escHtml(c.ownerEmail||c.ownerId.slice(0,8))+'</div>'+
      '<div class="cell-sub" style="margin-top:1px">생성: '+(c.createdAt?fmtDate(c.createdAt):'—')+'&nbsp;·&nbsp;경기일 '+c.dayCount+'일&nbsp;·&nbsp;'+c.gameCount+'게임</div></div>';
    // 등록회원 (바 차트)
    html+='<div style="display:flex;align-items:center;gap:6px;padding:0 4px">'+
      '<div class="bar-track" style="flex:1"><div class="bar-fill" style="width:'+barPct+'%;background:'+barColor+'"></div></div>'+
      '<span class="cell-num" style="min-width:24px">'+c.totalMembers+'</span></div>';
    // 앱연결
    html+='<div class="cell-num" style="color:var(--green)">'+c.linkedMembers+'</div>';
    // 미연결
    html+='<div class="cell-num" style="color:var(--muted)">'+c.unlinkedMembers+'</div>';
    // 상태
    html+='<div style="text-align:center">'+statusBadge+'<div class="cell-date" style="margin-top:3px">'+daysLabel+'</div></div>';
    // 마지막활동
    html+='<div class="cell-date" style="text-align:center">'+(c.updatedAt?fmtDate(c.updatedAt):'—')+'</div>';
    // 플랜
    html+='<div style="text-align:center">'+planBadge+'</div>';
    html+='</div>';
  });

  return html;
}

// ── 유틸 ──────────────────────────────
function sumCard(label,color,value,sub){
  return '<div class="sum-card" style="--accent-c:'+color+'">'+
    '<div class="sum-label">'+label+'</div>'+
    '<div class="sum-value" style="color:'+color+'">'+value+'</div>'+
    '<div class="sum-sub">'+sub+'</div>'+
  '</div>';
}
function setFilter(f){
  currentFilter=f;
  render();
  // restore search
  var el=document.getElementById('searchInp');
  if(el){el.value=searchQuery;el.focus();}
}
function fmtDate(ts){
  var d=new Date(ts);
  return d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');
}
function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
